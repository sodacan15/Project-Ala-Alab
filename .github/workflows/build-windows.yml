name: Build Windows Installer

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install frontend & build
        run: |
          cd frontend
          npm ci
          npm run build
        shell: pwsh

      - name: Install backend deps
        run: |
          cd backend
          npm ci
        shell: pwsh

      - name: Install electron deps
        run: |
          cd electron
          npm ci
        shell: pwsh

      - name: Copy frontend build into electron app (PowerShell-safe)
        run: |
          Remove-Item -Recurse -Force electron/dist -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path electron/dist | Out-Null
          Copy-Item -Path ../frontend/dist/* -Destination electron/dist -Recurse -Force
        shell: pwsh
          
      - name: Build installer
        run: |
          cd electron
          npx electron-builder --win --x64 --publish never
        shell: pwsh

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ala-alab-windows-installer
          path: electron/dist/*.exe
